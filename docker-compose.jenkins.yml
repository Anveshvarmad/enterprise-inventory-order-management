services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: inventory-jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - inventory_jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=true

volumes:
  inventory_jenkins_home:
